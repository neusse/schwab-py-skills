<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">Schwab-Py Codex Skills banner</title>
  <desc id="desc">A polished dashboard-style banner showing Codex skills connected to Schwab market data, portfolio, orders, and streaming workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.45" stop-color="#0f2741"/>
      <stop offset="1" stop-color="#102a2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#24c6dc"/>
      <stop offset="0.5" stop-color="#f6c85f"/>
      <stop offset="1" stop-color="#ff6b6b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#152941"/>
      <stop offset="1" stop-color="#0c1726"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="420" rx="28" fill="url(#grid)"/>
  <path d="M0 330 C165 260 230 380 402 305 C559 236 642 186 786 229 C927 271 1009 171 1280 112 L1280 420 L0 420 Z" fill="#24c6dc" opacity="0.08"/>
  <path d="M0 110 C178 158 257 52 392 116 C533 184 621 157 759 104 C902 49 1042 78 1280 28" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.8"/>
  <path d="M0 142 C174 194 258 86 396 146 C535 207 622 182 762 133 C906 82 1048 110 1280 64" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.22"/>

  <g filter="url(#shadow)">
    <rect x="64" y="60" width="520" height="300" rx="18" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.12"/>
    <rect x="92" y="92" width="118" height="30" rx="15" fill="#24c6dc" opacity="0.16"/>
    <text x="110" y="113" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#6ee7f2">CODEX SKILLS</text>
    <text x="92" y="168" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="48" font-weight="800" fill="#f8fbff">Schwab-Py</text>
    <text x="92" y="218" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="48" font-weight="800" fill="#f8fbff">Trading Workflows</text>
    <text x="94" y="262" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" fill="#c8d7e8">Direct Python utilities for market data, portfolios, orders, and streams.</text>
    <rect x="92" y="302" width="128" height="34" rx="8" fill="#f6c85f" opacity="0.95"/>
    <text x="116" y="325" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="#19202c">NO MCP</text>
    <rect x="234" y="302" width="164" height="34" rx="8" fill="#24c6dc" opacity="0.95"/>
    <text x="258" y="325" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="#06202a">DRY-RUN FIRST</text>
    <rect x="412" y="302" width="118" height="34" rx="8" fill="#ff6b6b" opacity="0.95"/>
    <text x="437" y="325" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="#2b0909">PREVIEW</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="650" y="70" width="270" height="118" rx="16" fill="#0e1b2c" stroke="#ffffff" stroke-opacity="0.13"/>
    <text x="676" y="106" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="#8bdff0">MARKET DATA</text>
    <text x="676" y="146" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="800" fill="#ffffff">AAPL 291.40</text>
    <path d="M676 164 L706 151 L734 156 L765 132 L799 139 L829 116 L889 121" fill="none" stroke="#24c6dc" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="960" y="70" width="240" height="118" rx="16" fill="#0e1b2c" stroke="#ffffff" stroke-opacity="0.13"/>
    <text x="986" y="106" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="#ffd36b">PORTFOLIO</text>
    <text x="986" y="145" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#ffffff">All Accounts</text>
    <rect x="986" y="163" width="172" height="9" rx="4.5" fill="#22364f"/>
    <rect x="986" y="163" width="124" height="9" rx="4.5" fill="#f6c85f"/>

    <rect x="650" y="226" width="270" height="118" rx="16" fill="#0e1b2c" stroke="#ffffff" stroke-opacity="0.13"/>
    <text x="676" y="262" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="#ff9898">ORDERS</text>
    <text x="676" y="301" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" fill="#ffffff">Bracket + OCO</text>
    <path d="M678 321 H890" stroke="#ff6b6b" stroke-width="4" stroke-linecap="round"/>
    <circle cx="736" cy="321" r="7" fill="#ff6b6b"/>
    <circle cx="828" cy="321" r="7" fill="#f6c85f"/>

    <rect x="960" y="226" width="240" height="118" rx="16" fill="#0e1b2c" stroke="#ffffff" stroke-opacity="0.13"/>
    <text x="986" y="262" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="#a3e635">STREAMING</text>
    <text x="986" y="301" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="29" font-weight="800" fill="#ffffff">Level One</text>
    <g fill="#a3e635">
      <circle cx="995" cy="324" r="4"/>
      <circle cx="1018" cy="324" r="4" opacity="0.75"/>
      <circle cx="1041" cy="324" r="4" opacity="0.5"/>
      <circle cx="1064" cy="324" r="4" opacity="0.28"/>
    </g>
  </g>

  <rect x="63" y="380" width="1154" height="4" rx="2" fill="url(#accent)" opacity="0.8"/>
</svg>
